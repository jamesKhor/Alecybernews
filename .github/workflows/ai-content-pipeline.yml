name: AI Content Pipeline

on:
  schedule:
    # Hourly — cron runs in UTC; pipeline is timezone-agnostic
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      max_articles:
        description: "Max articles to generate"
        required: false
        default: "3"
      dry_run:
        description: "Dry run — fetch feeds but do not generate or write"
        required: false
        type: boolean
        default: false

concurrency:
  group: ai-pipeline
  cancel-in-progress: false

jobs:
  generate:
    name: Generate & Publish Articles
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      # actions: write is REQUIRED for `gh workflow run` to dispatch
      # deploy-vps.yml after we push a commit. Without it, the dispatch
      # call silently 403s — pipeline commits land but never deploy.
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          HUSKY: 0

      # Persist RSS dedup cache across pipeline runs. Without this, every
      # ephemeral runner starts with empty .pipeline-cache/ → re-processes
      # all RSS items → re-generates articles already published (we've
      # seen "Agentic AI Memory Attacks" published twice with slightly
      # different slugs). actions/cache stores the folder between runs.
      # Cache key: stable on the date so 24 runs/day share a cache, with
      # restore-key fallback to any older cache. Previously used run_id which
      # is unique per run → primary key never matched, ALWAYS fell through to
      # restore-keys (so it worked, but cache saved on every successful run
      # even when nothing changed). New behavior: cache only saves once per
      # day (when something changes), still restores from yesterday on a
      # fresh day. NOTE: cache only saves on SUCCESSFUL job exit; if the
      # pipeline commits but later fails (e.g. dispatch error), cache isn't
      # written and the next run re-processes the same RSS items. Mitigate
      # by failing fast (which subsequent fixes do) and by relying on the
      # in-pipeline "already covered" filename check as a second line of
      # defense.
      - name: Restore pipeline cache
        uses: actions/cache@v4
        with:
          path: .pipeline-cache
          key: pipeline-cache-v1-${{ github.run_id }}
          restore-keys: |
            pipeline-cache-v1-
            pipeline-cache-

      - name: Run AI Pipeline
        id: pipeline
        env:
          MAX_ARTICLES: ${{ inputs.max_articles || '3' }}
          DRY_RUN: ${{ inputs.dry_run }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: |
          MAX_ARTICLES=$(echo "$MAX_ARTICLES" | grep -oE '^[0-9]+$' || echo 3)
          ARGS="--max-articles=$MAX_ARTICLES"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          set +e
          npx tsx scripts/pipeline/index.ts $ARGS
          PIPELINE_EXIT=$?
          set -e
          echo "pipeline_exit=$PIPELINE_EXIT" >> "$GITHUB_OUTPUT"
          if [ "$PIPELINE_EXIT" -ne 0 ]; then
            echo "::warning::Pipeline exited with code $PIPELINE_EXIT (partial failures possible; still committing whatever succeeded)"
          fi

      - name: Detect new content
        id: detect
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          NEW_FILES=$(git status --short content/ public/images/articles/ .pipeline-cache/ 2>/dev/null | wc -l | tr -d ' ')
          echo "new_files=$NEW_FILES" >> "$GITHUB_OUTPUT"
          echo "📂 $NEW_FILES new or modified file(s)"

      - name: Collect article titles
        id: titles
        if: ${{ inputs.dry_run != 'true' && steps.detect.outputs.new_files != '0' }}
        run: |
          # Extract the title: field from MDX frontmatter of each new/modified
          # English article (not the filename). Was previously using filenames
          # which produced garbled slug-style Telegram messages like
          # "• 2026 04 14 fake proxifier installer github clipbanker malware".
          set +e
          TITLES=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ -f "$file" ] || continue
            # Grab the first `title:` line, strip quotes, take the value
            title=$(awk -F: '/^title:/ {sub(/^[[:space:]]*title:[[:space:]]*/,""); gsub(/^["'\'']|["'\'']$/,""); print; exit}' "$file")
            [ -n "$title" ] && TITLES="${TITLES}• ${title}"$'\n'
          done < <(git status --short content/en/ 2>/dev/null | awk '/\.mdx$/ {print $2}' | head -5)
          set -e
          # Count real titles extracted
          COUNT=$(printf '%s' "$TITLES" | grep -c '^•' || echo 0)
          {
            echo 'titles<<EOF'
            printf '%s' "$TITLES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Extracted $COUNT titles:"
          printf '%s' "$TITLES"

      - name: Commit generated content
        if: ${{ inputs.dry_run != 'true' && steps.detect.outputs.new_files != '0' }}
        run: |
          set -e
          git config user.name "zcybernews-bot"
          git config user.email "bot@zcybernews.com"
          # Stage each path INDIVIDUALLY with per-path error tolerance:
          # - `git add` aborts with exit 128 on the first missing pathspec
          #   and stages NOTHING. A batched 'git add content/ missing/' would
          #   leave content/ unstaged even though it exists.
          # - .pipeline-cache/ is gitignored; `git add .pipeline-cache` then
          #   returns non-zero with "paths are ignored" — killing the step
          #   under `set -e`.
          # The || true swallows per-path failures; the important 'content/'
          # add will succeed independent of what the other paths do. The
          # subsequent `git diff --staged --quiet` will catch the case where
          # NO path staged anything.
          for p in content public/images/articles data; do
            if [ -e "$p" ]; then
              git add "$p" 2>/dev/null || true
            fi
          done
          if git diff --staged --quiet; then
            echo "::notice::Nothing to commit — skipping push"
            exit 0
          fi
          git commit -m "chore: ai pipeline $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Retry loop — if push is rejected (non-fast-forward because someone
          # else committed during our ~3-5 min run), rebase our commit on top
          # of their new tip and try again. NEVER reset --hard on failure —
          # that silently discards the articles we just generated.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main; then
              if git push origin main; then
                echo "✅ Pushed successfully on attempt $attempt"
                # NOTE: Pushes by GITHUB_TOKEN deliberately do NOT trigger
                # other workflows (anti-loop safety). So the new commit
                # won't fire deploy-vps.yml automatically. We dispatch it
                # explicitly below in the next step.
                exit 0
              fi
            else
              # Rebase conflict — abort and retry with fresh fetch
              git rebase --abort 2>/dev/null || true
            fi
            echo "::warning::Push attempt $attempt failed, retrying in $((5 * attempt))s"
            sleep $((5 * attempt))
          done

          # All retries exhausted → real failure. DO NOT reset --hard (articles
          # would be lost). Stash the new files outside the repo so the next
          # job step can upload them as an artifact for manual recovery —
          # otherwise the runner is destroyed and the AI generation cost is
          # wasted.
          mkdir -p /tmp/orphaned-articles
          # Copy whatever the pipeline wrote, even though commit failed
          for p in content/en/posts content/zh/posts content/en/threat-intel content/zh/threat-intel; do
            if [ -d "$p" ]; then
              # Capture files modified in the last 10 min (this run's output)
              find "$p" -name '*.mdx' -mmin -10 -exec cp --parents {} /tmp/orphaned-articles/ \; 2>/dev/null || true
            fi
          done
          ARTIFACT_COUNT=$(find /tmp/orphaned-articles -name '*.mdx' 2>/dev/null | wc -l | tr -d ' ')
          echo "::error::Failed to push articles after 3 attempts. ${ARTIFACT_COUNT} MDX files saved to /tmp/orphaned-articles/ for upload as artifact in the next step. Check for concurrent commits or protected-branch issues."
          # Mark this for the upload step (which only runs on failure)
          echo "ORPHAN_COUNT=${ARTIFACT_COUNT}" >> "$GITHUB_ENV"
          exit 1

      - name: Upload orphaned articles (push-failure recovery)
        # Only fires if the previous step failed AND saved orphaned files.
        # Saved articles are downloadable from the run page for 7 days,
        # giving you a chance to recover the AI work and commit manually.
        if: ${{ failure() && env.ORPHAN_COUNT != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: orphaned-articles-${{ github.run_id }}
          path: /tmp/orphaned-articles/
          retention-days: 7

      - name: Trigger deploy-vps (push by GITHUB_TOKEN doesn't auto-trigger)
        if: ${{ inputs.dry_run != 'true' && steps.titles.outputs.count != '0' && steps.titles.outputs.count != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub Actions deliberately suppresses workflow triggers when
          # the push is made by the auto-issued GITHUB_TOKEN (anti-loop).
          # Without this dispatch, the pipeline commit reaches main but
          # deploy-vps.yml never fires → article exists in repo but never
          # makes it to the VPS. Manually dispatch the deploy here.
          #
          # NOTE: this requires `actions: write` permission on the job
          # (see top of file). Without it, `gh workflow run` 403s.
          #
          # Explicitly check exit code — earlier version used
          #   gh ... || echo "::warning::Failed..."
          # which swallowed the error, making the step pass even on 403.
          # Now a dispatch failure makes this step fail loudly and the
          # Telegram failure-notify fires so the issue surfaces fast.
          if gh workflow run deploy-vps.yml --ref main; then
            echo "✅ Dispatched deploy-vps.yml"
          else
            echo "::error::Failed to dispatch deploy-vps. Articles committed to main but VPS won't pull until this is fixed. Check that 'actions: write' permission is set on this workflow."
            exit 1
          fi

      - name: Notify Telegram — success
        # Gate on titles.count (real articles published), not detect.new_files.
        # detect.new_files counts ALL changed files including .pipeline-cache
        # (RSS dedup state) which can change without any new article. Without
        # this, you'd get fake "Published 0 article(s)" Telegrams.
        if: ${{ success() && inputs.dry_run != 'true' && steps.titles.outputs.count != '0' && steps.titles.outputs.count != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COUNT: ${{ steps.titles.outputs.count }}
          TITLES: ${{ steps.titles.outputs.titles }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::notice::Telegram secrets not configured — skipping notification"
            exit 0
          fi
          TIME=$(TZ='Asia/Singapore' date '+%H:%M SGT')
          # Build the message with REAL newlines via $'\n' ANSI-C quoting,
          # appended incrementally with +=. Passing literal newlines in a
          # YAML `run: |` block breaks YAML parsing (continuation lines
          # need block-level indent). --data-urlencode handles the single
          # URL-encoding pass at send time. Previously I wrote literal
          # "%0A" which got double-encoded to "%250A" and arrived at
          # Telegram as visible "%0A" text.
          MESSAGE="✅ <b>ZCyberNews Published ${COUNT} article(s)</b>"
          MESSAGE+=$'\n'"Time: ${TIME}"
          MESSAGE+=$'\n\n'"${TITLES}"
          MESSAGE+=$'\n'"🔗 https://zcybernews.com"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode parse_mode="HTML" \
            --data-urlencode disable_web_page_preview="true" \
            --data-urlencode text="$MESSAGE" \
            > /dev/null || true

      - name: Notify Telegram — no new articles
        if: ${{ success() && inputs.dry_run != 'true' && steps.detect.outputs.new_files == '0' }}
        run: |
          echo "::notice::No new articles this run (all stories already processed) — no notification sent."

      - name: Notify Telegram — failure
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          FAIL_MESSAGE="❌ <b>ZCyberNews Pipeline failed</b>"
          FAIL_MESSAGE+=$'\n\n'"Run: ${RUN_URL}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode parse_mode="HTML" \
            --data-urlencode disable_web_page_preview="true" \
            --data-urlencode text="$FAIL_MESSAGE" \
            > /dev/null || true
