name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: "Force full rebuild even for content-only changes"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  # Detect what kind of change was pushed. Content-only = new MDX articles
  # or updated default images. Code = everything else that needs rebuild.
  classify:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      needs_rebuild: ${{ steps.check.outputs.needs_rebuild }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect changed files
        id: check
        run: |
          # Manual dispatch with force_full_rebuild wins
          if [ "${{ inputs.force_full_rebuild }}" = "true" ]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "::notice::force_full_rebuild requested — doing full rebuild"
            exit 0
          fi

          # First commit / no parent → full rebuild
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No parent commit — doing full rebuild"
            exit 0
          fi

          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          # Safety: if the diff is empty (force-push, weird merge, dispatch
          # without a real change), fall back to full rebuild. Better to do
          # a needless rebuild than to silently "succeed" with no actual
          # work on a divergent VPS.
          if [ -z "$CHANGED" ]; then
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Empty diff between HEAD~1 and HEAD — defaulting to full rebuild"
            exit 0
          fi

          # Paths that DON'T require a VPS rebuild — strip them out of the
          # change list; if nothing remains, it's a no-rebuild change.
          #
          # The principle: anything that doesn't affect what the Next.js
          # process serves at runtime should skip the full rebuild. The
          # VPS still pulls the files (so local backup scripts stay in
          # sync), but PM2 keeps serving traffic uninterrupted.
          #
          #   Content (served via ISR, regenerated on request):
          #     content/                    → MDX articles
          #     public/images/articles/     → article hero images
          #     .pipeline-cache/            → RSS dedup cache
          #     data/                       → subscribers.json, rss-sources.json
          #
          #   CI/CD configuration (runs on GitHub's runners, not the VPS):
          #     .github/workflows/          → workflow YAML files
          #     .github/actions/            → custom composite actions
          #     .github/ISSUE_TEMPLATE/     → issue templates
          #     .github/dependabot.yml, .github/FUNDING.yml, etc. (see root match)
          #
          #   Docs / editor config (not runtime):
          #     docs/                       → documentation (future)
          #     .claude/                    → Claude Code session state
          #     .vscode/                    → editor settings (future)
          #     .idea/                      → JetBrains editor settings (future)
          #
          #   Scripts (run on GitHub Actions OR as separate PM2 processes —
          #   none of them are loaded by the zcybernews Next.js process):
          #     scripts/                    → pipeline, AI provider, telegram bot
          #     NOTE: scripts/telegram/bot.mjs is a separate PM2 process
          #     (tg-claude); changes there need manual 'pm2 restart tg-claude'
          #     on the VPS. Not handled by this workflow.
          #
          #   Root-level meta (not runtime):
          #     Any root *.md (README, CLAUDE, AGENTS, CHANGELOG...)
          #     LICENSE, .gitignore, .env.example, .editorconfig,
          #     .prettierignore, vercel.json (Vercel-only config)
          NON_CONTENT=$(echo "$CHANGED" \
            | grep -v -E '^(content/|public/images/articles/|\.pipeline-cache/|data/)' \
            | grep -v -E '^\.github/(workflows|actions|ISSUE_TEMPLATE)/' \
            | grep -v -E '^(docs|\.claude|\.vscode|\.idea|scripts)/' \
            | grep -v -E '^[^/]+\.md$' \
            | grep -v -E '^(LICENSE|\.gitignore|\.env\.example|\.editorconfig|\.prettierignore|vercel\.json)$' \
            | grep -v -E '^\.github/[^/]+\.(yml|yaml)$' \
            || true)

          if [ -z "$NON_CONTENT" ]; then
            echo "needs_rebuild=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No runtime changes — skipping rebuild, will revalidate instead"
          else
            echo "needs_rebuild=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Code/config change detected — full rebuild needed"
            echo "Files triggering rebuild:"
            echo "$NON_CONTENT"
          fi

  # Content-only path: git pull + revalidate. ~10 seconds, zero downtime.
  content-only:
    name: Content sync (no rebuild)
    needs: classify
    if: needs.classify.outputs.needs_rebuild == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Pull + revalidate on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: zcybernews
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 2m
          script: |
            set -e
            cd /home/zcybernews/zcybernews

            echo "⬇️  Pulling latest content..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔄 Triggering ISR revalidation..."
            SECRET=$(grep '^REVALIDATE_SECRET=' .env.local | cut -d= -f2-)
            if [ -z "$SECRET" ]; then
              echo "::error::[ACTION REQUIRED] REVALIDATE_SECRET is missing from .env.local on the VPS."
              echo "::error::New MDX files were pulled to disk but the ISR cache was NOT cleared."
              echo "::error::Articles will sit stale for up to 1h until ISR TTL expires."
              echo "::error::Fix: SSH to VPS and add to /home/zcybernews/zcybernews/.env.local:"
              echo "::error::  REVALIDATE_SECRET=<value matching the GitHub Actions REVALIDATE_SECRET secret>"
              echo "::error::Then re-run this workflow (workflow_dispatch) or wait for the next pipeline push."
              # Exit 1 so the failure Telegram fires — a content-sync that
              # doesn't actually revalidate is functionally broken from the
              # operator's perspective. Silent exit 0 hid this for hours.
              exit 1
            else
              # Retry revalidate up to 3 times with backoff. PM2 cluster
              # reload, brief network blip, or worker mid-restart can all
              # cause a transient curl failure; if we don't retry, articles
              # sit stale for up to 1h until the next ISR refresh. The
              # revalidate endpoint itself is idempotent — calling it
              # multiple times in a row is safe.
              REVALIDATED=false
              for attempt in 1 2 3; do
                if curl -sf -X POST \
                  -H "x-revalidate-secret: $SECRET" \
                  "http://localhost:3000/api/revalidate?tag=articles&path=/en/articles&path=/zh/articles" \
                  > /dev/null; then
                  echo "✅ Revalidated on attempt $attempt"
                  REVALIDATED=true
                  break
                fi
                echo "::warning::Revalidate attempt $attempt failed; retrying in $((2 * attempt))s"
                sleep $((2 * attempt))
              done
              if [ "$REVALIDATED" != "true" ]; then
                echo "::error::Revalidate failed after 3 attempts. New content is on disk but ISR cache is stale until 1h TTL. Check 'pm2 logs zcybernews' for /api/revalidate errors."
                exit 1
              fi
            fi

            echo "✅ Content sync complete at $(TZ='Asia/Singapore' date '+%Y-%m-%d %H:%M:%S SGT')"

      - name: Notify Telegram — content-sync failure
        # Same rationale as full-deploy failure-notify below: silent
        # content-sync failures (git pull error, revalidate exhausting
        # retries, SSH timeout) used to require checking GitHub Actions
        # to discover. Now they ping Telegram.
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SHA_SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
          MESSAGE="⚠️ <b>ZCyberNews content-sync deploy failed</b>"
          MESSAGE+=$'\n'"Commit: ${SHA_SHORT}"
          MESSAGE+=$'\n\n'"Run: ${RUN_URL}"
          MESSAGE+=$'\n\n'"New content didn't reach VPS or revalidate failed. Articles will appear after 1h ISR TTL fallback. Check the run for details."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode parse_mode="HTML" \
            --data-urlencode disable_web_page_preview="true" \
            --data-urlencode text="$MESSAGE" \
            > /dev/null || true

  # Code path: full rebuild + PM2 reload. Only for real code changes.
  #
  # ZERO-DOWNTIME STRATEGY (Option B — build on runner, rsync, cluster reload):
  #
  # Previously: SSH to VPS → pm2 stop → rm .next → npm run build → pm2 start
  # Problem: ~60-90s downtime per code deploy, because building ON the server
  # requires stopping it to avoid file-write races with the running process.
  # Worst: 1 incident 2026-04-17 where operator saw 502 during code deploy.
  #
  # New approach: build on GitHub Actions runner (free, fast, no downtime
  # risk), upload the build artifact, download on VPS into a staging path,
  # atomically swap the .next directory, then `pm2 reload` (cluster rolling
  # update — workers cycle one at a time, old stays serving until new is
  # ready).
  #
  # Why this works where in-place build didn't:
  #   • The running VPS process keeps serving from the OLD .next the entire
  #     time the NEW .next is being prepared — no file races, no ENOENT
  #     errors on lazy-loaded chunks.
  #   • `pm2 reload` (NOT `restart`) does a rolling worker cycle in cluster
  #     mode: worker 0 drains + reboots while worker 1 keeps serving, then
  #     swap. Genuine zero-downtime.
  #   • Atomic directory swap via `mv` (rename is atomic on ext4). Even if
  #     something kills the workflow between rsync and pm2 reload, the old
  #     .next is still in place. Rollback = revert the swap.
  #
  # Memory: the build runs on GitHub's 7GB runner, not the 2GB VPS — so
  # the --max-old-space-size=1536 hack is no longer needed.
  full-deploy:
    name: Full rebuild + zero-downtime reload
    needs: classify
    if: needs.classify.outputs.needs_rebuild == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies (runner)
        run: npm ci
        env:
          HUSKY: 0

      - name: Build on runner (not VPS)
        run: npm run build
        env:
          # Match VPS runtime — keeps the Zod/runtime errors consistent
          NEXT_PUBLIC_SITE_URL: https://zcybernews.com
          # Pipe through build-time env vars if any future feature needs them.
          # Keep this list explicit — we do NOT want to leak admin secrets
          # into the client bundle.

      - name: Verify build completeness
        run: |
          test -f .next/prerender-manifest.json \
            || (echo "❌ Build missing prerender-manifest.json"; exit 1)
          test -d .next/server \
            || (echo "❌ Build missing .next/server/"; exit 1)
          echo "✅ Build artifacts look valid"
          du -sh .next

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync build + source to VPS (staging dir)
        run: |
          # Stream the built .next + package.json + node deps-adjacent files
          # into a staging directory on the VPS. This doesn't touch the
          # currently-serving .next at all — that one keeps serving traffic.
          # --delete removes files from the staging dir that are no longer
          # in the build. -z compresses the transfer.
          # We rsync .next and public separately so a partial failure is
          # survivable (the old .next stays until the swap).
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next-staging' \
            --exclude='.next-prev' \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            ./.next/ \
            zcybernews@${{ secrets.VPS_HOST }}:/home/zcybernews/zcybernews/.next-staging/

      - name: Pull code, install deps, atomic swap, reload PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: zcybernews
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e
            cd /home/zcybernews/zcybernews

            echo "⬇️  Syncing source code (for server-side reads — content/, app/, lib/, scripts/)..."
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Installing dependencies (server-side deps still needed)..."
            HUSKY=0 npm ci --production=false --silent

            # Verify the staged build that rsync just uploaded
            test -f .next-staging/prerender-manifest.json \
              || (echo "❌ Staged build missing prerender-manifest.json — aborting, old build still serving"; exit 1)

            echo "🔄 Atomic swap: staging → live, live → previous"
            # If .next-prev exists from a previous deploy, remove it first
            [ -d .next-prev ] && sudo rm -rf .next-prev
            # Move current .next to .next-prev (atomic rename)
            [ -d .next ] && sudo mv .next .next-prev
            # Move staged build to .next (atomic rename)
            sudo mv .next-staging .next

            echo "♻️  Rolling PM2 reload (cluster workers cycle one at a time)..."
            if pm2 describe zcybernews > /dev/null 2>&1; then
              # RELOAD, not restart. In cluster mode, this cycles workers
              # one at a time — zero requests dropped.
              pm2 reload zcybernews --update-env
            else
              # First-time start: cluster mode with 2 workers. Once this
              # lands, future 'pm2 restart' will preserve cluster mode.
              # max-memory-restart protects the 2GB VPS from OOM spirals.
              pm2 start npm --name zcybernews \
                -i 2 \
                --exec-mode cluster \
                --max-memory-restart 750M \
                -- start
            fi
            pm2 save

            echo "🏥 Health check..."
            sleep 5
            curl -sf http://localhost:3000 > /dev/null || {
              echo "❌ Health check failed — recent logs:"
              pm2 logs zcybernews --lines 20 --nostream
              exit 1
            }

            echo "✅ Deployed $(git rev-parse --short HEAD) at $(TZ='Asia/Singapore' date '+%Y-%m-%d %H:%M:%S SGT')"

      - name: Notify Telegram — deploy failure
        # Fires if any preceding step failed (build error, OOM, PM2 won't
        # start, health-check 502, etc.). Without this, code deploy
        # failures are invisible until a customer reports the site is
        # down. The pipeline workflow has a similar step; this mirrors
        # it for full code deploys.
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::Telegram secrets not configured — can't send deploy-failure notification"
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          SHA_SHORT=$(echo "$GITHUB_SHA" | cut -c1-7)
          MESSAGE="🚨 <b>ZCyberNews FULL DEPLOY FAILED</b>"
          MESSAGE+=$'\n'"Commit: ${SHA_SHORT}"
          MESSAGE+=$'\n\n'"Run: ${RUN_URL}"
          MESSAGE+=$'\n\n'"⚠️ Site may be DOWN — check pm2 status zcybernews"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode parse_mode="HTML" \
            --data-urlencode disable_web_page_preview="true" \
            --data-urlencode text="$MESSAGE" \
            > /dev/null || true
