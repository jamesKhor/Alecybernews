name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deploys from queuing up and stomping each other
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: zcybernews
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /home/zcybernews/zcybernews

            echo "⬇️  Syncing to latest remote main..."
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            HUSKY=0 npm ci --production=false

            echo "⏹️  Stopping app during build..."
            pm2 stop zcybernews 2>/dev/null || true

            echo "🧹 Cleaning old build cache..."
            rm -rf .next 2>/dev/null || true

            echo "🔨 Building (commit: $(git rev-parse --short HEAD))..."
            export NODE_OPTIONS="--max-old-space-size=1536"
            npm run build

            echo "♻️  Restarting PM2..."
            pm2 restart zcybernews || pm2 start npm --name zcybernews -- start
            pm2 save

            echo "🏥 Health check..."
            sleep 5
            curl -sf http://localhost:3000 > /dev/null || {
              echo "❌ Health check failed — recent logs:"
              pm2 logs zcybernews --lines 20 --nostream
              exit 1
            }

            echo "✅ Deployed $(git rev-parse --short HEAD) at $(TZ='Asia/Singapore' date '+%Y-%m-%d %H:%M:%S SGT')"
