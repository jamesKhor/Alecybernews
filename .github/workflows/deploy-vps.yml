name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent deploys from queuing up and stomping each other
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: zcybernews
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/zcybernews/zcybernews

            echo "⬇️  Syncing to latest remote main..."
            # Use fetch + reset instead of pull to handle diverged local branches
            # (pipeline commits locally before push; git pull fails on diverge)
            git fetch origin main
            git reset --hard origin/main

            echo "📦 Installing dependencies..."
            HUSKY=0 npm ci --production=false

            echo "🧹 Cleaning old build cache..."
            rm -rf .next

            echo "🔨 Building (commit: $(git rev-parse --short HEAD))..."
            npm run build

            echo "♻️  Restarting PM2..."
            pm2 restart zcybernews || pm2 start npm --name zcybernews -- start
            pm2 save

            echo "✅ Deployed $(git rev-parse --short HEAD) at $(TZ='Asia/Singapore' date '+%Y-%m-%d %H:%M:%S SGT')"
